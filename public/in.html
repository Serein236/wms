<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>入库管理 - 仓库管理系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/common.css" rel="stylesheet">
    <link href="css/modern.css" rel="stylesheet">
</head>
<body>

        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-warehouse me-2"></i>仓库管理系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house-door me-1"></i>首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="product_list.html"><i class="bi bi-box-seam me-1"></i>商品管理</a></li>
                    <li class="nav-item"><a class="nav-link active" href="in.html"><i class="bi bi-arrow-down-circle me-1"></i>入库</a></li>
                    <li class="nav-item"><a class="nav-link" href="out.html"><i class="bi bi-arrow-up-circle me-1"></i>出库</a></li>
                    <li class="nav-item"><a class="nav-link" href="stock.html"><i class="bi bi-clipboard-data me-1"></i>库存</a></li>
                    <li class="nav-item"><a class="nav-link" href="suppliers.html"><i class="bi bi-truck me-1"></i>供应商</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-bar-chart me-1"></i>看板</a></li>
                    <li class="nav-item"><a class="nav-link" href="batch.html"><i class="bi bi-list-columns me-1"></i>批量</a></li>
                    <li class="nav-item"><a class="nav-link" href="stocktaking.html"><i class="bi bi-clipboard-check me-1"></i>盘点</a></li>

                </ul>
                <div class="d-flex align-items-center text-white">
                    <span id="currentUser" class="me-3"></span>
                    <button class="btn btn-outline-light btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>退出</button>
                </div>
            </div>

    <div class="container-fluid main-content">
        <div class="page-header d-flex justify-content-between align-items-center">
            <div>
                <h2 class="mb-1"><i class="bi bi-arrow-down-circle me-2"></i>入库管理</h2>
                <p class="mb-0">办理商品入库，记录入库方式和来源</p>
            </div>
            <a href="in_records.html" class="btn btn-outline-light btn-sm"><i class="bi bi-list-ul me-1"></i>查看入库记录</a>
        </div>
        <div class="row g-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header"><i class="bi bi-plus-circle me-2"></i>办理入库</div>
                    <div class="card-body">
                        <form id="inForm">
                            <div class="row g-3">
                                <div class="col-md-12">
                                    <label for="productId" class="form-label">选择商品 <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <select class="form-select" id="productId" required><option value="">请选择商品</option></select>
                                        <button class="btn btn-outline-success" type="button" onclick="openScanner()" title="扫描条码"><i class="bi bi-upc-scan"></i> 扫码</button>
                                    </div>
                                </div>
                                <div class="col-md-12">
                                    <label for="stock_method_name" class="form-label">入库方式 <span class="text-danger">*</span></label>
                                    <select class="form-select" id="stock_method_name" required>
                                        <option value="采购入库">采购入库</option><option value="退货入库">退货入库</option><option value="调拨入库">调拨入库</option><option value="生产入库">生产入库</option><option value="其他入库">其他入库</option>
                                    </select>
                                </div>
                                <div class="col-md-12">
                                    <label for="batch_number" class="form-label">产品批号 <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="batch_number" required placeholder="请输入产品批号">
                                </div>
                                <div class="col-md-6">
                                    <label for="production_date" class="form-label">生产日期 <span class="text-danger">*</span></label>
                                    <input type="date" class="form-control" id="production_date" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="expiration_date" class="form-label">过期日期 <span class="text-danger">*</span></label>
                                    <input type="date" class="form-control" id="expiration_date" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="quantity" class="form-label">入库数量 <span class="text-danger">*</span></label>
                                    <input type="number" class="form-control" id="quantity" min="1" required placeholder="数量">
                                </div>
                                <div class="col-md-4">
                                    <label for="unit_price" class="form-label">入库单价 <span class="text-danger">*</span></label>
                                    <input type="number" class="form-control" id="unit_price" min="0" step="0.01" required placeholder="单价">
                                </div>
                                <div class="col-md-4">
                                    <label for="total_amount" class="form-label">总金额 <span class="text-danger">*</span></label>
                                    <input type="number" class="form-control" id="total_amount" min="0" step="0.01" required placeholder="自动计算" readonly>
                                </div>
                                <div class="col-md-6">
                                    <label for="recordedDate" class="form-label">入库日期 <span class="text-danger">*</span></label>
                                    <input type="date" class="form-control" id="recordedDate" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="source" class="form-label">供应商名称</label>
                                    <div class="position-relative">
                                        <input type="text" class="form-control" id="source" placeholder="输入供应商名称自动匹配">
                                        <div id="supplierSuggestions" class="position-absolute w-100 bg-white border rounded shadow-sm d-none" style="z-index:10;max-height:200px;overflow-y:auto;"></div>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <label for="remark" class="form-label">备注</label>
                                    <textarea class="form-control" id="remark" rows="2" placeholder="可选填写"></textarea>
                                </div>
                                <div class="col-12"><button type="submit" class="btn btn-primary"><i class="bi bi-check-circle me-2"></i>提交入库</button></div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header"><i class="bi bi-info-circle me-2"></i>商品信息</div>
                    <div class="card-body"><div id="productInfo" class="text-center py-4"><p class="text-muted">请选择商品以查看详细信息</p></div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="scannerModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title"><i class="bi bi-upc-scan me-2"></i>条码扫描</h5><button type="button" class="btn-close" data-bs-dismiss="modal" onclick="stopScanner()"></button></div>
                <div class="modal-body">
                    <div id="scanner-container" style="width:100%;height:300px;background:#000;border-radius:8px;overflow:hidden;"></div>
                    <div class="mt-3"><div class="input-group"><span class="input-group-text">手动输入</span><input type="text" class="form-control" id="manualBarcode" placeholder="条码"><button class="btn btn-primary" onclick="manualSearch()">搜索</button></div></div>
                    <div id="scanResult" class="mt-3 d-none"><div class="alert alert-success"><i class="bi bi-check-circle me-2"></i><span id="scanResultText"></span></div></div>
                </div>
            </div>
        </div>
    </div>

    <footer><div class="container">&copy; 2026 仓库管理系统 | <a href="https://beian.miit.gov.cn/" target="_blank" class="text-decoration-none text-reset">鄂ICP备2025167566号</a></div></footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <script src="js/in.js"></script>
    <script>
        var scannerModal = null;
        function openScanner() { scannerModal = new bootstrap.Modal(document.getElementById('scannerModal')); scannerModal.show(); document.getElementById('scanResult').classList.add('d-none'); startScanner(); }
        function startScanner() { if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) { Quagga.init({ inputStream: { name: "Live", type: "LiveStream", target: document.getElementById('scanner-container'), constraints: { facingMode: "environment" } }, decoder: { readers: ["ean_reader","ean_8_reader","code_128_reader","code_39_reader","upc_reader","upc_e_reader"] } }, function(err) { if (err) return; Quagga.start(); }); Quagga.onDetected(function(r) { document.getElementById('manualBarcode').value = r.codeResult.code; searchByBarcode(r.codeResult.code); }); } }
        function stopScanner() { try { Quagga.stop(); } catch(e) {} }
        function manualSearch() { var c = document.getElementById('manualBarcode').value.trim(); if (c) searchByBarcode(c); }
        async function searchByBarcode(barcode) { try { var resp = await fetch('/api/products/barcode/' + encodeURIComponent(barcode)); var result = await resp.json(); if (result.success && result.data) { var sel = document.getElementById('productId'); for (var i = 0; i < sel.options.length; i++) { if (sel.options[i].value == result.data.id) { sel.selectedIndex = i; break; } } document.getElementById('scanResultText').textContent = '找到商品: ' + result.data.name; document.getElementById('scanResult').classList.remove('d-none'); setTimeout(function() { stopScanner(); scannerModal.hide(); }, 1500); } else { document.getElementById('scanResultText').textContent = '未找到对应商品'; document.getElementById('scanResult').className = 'mt-3 alert alert-warning'; document.getElementById('scanResult').classList.remove('d-none'); } } catch(e) {} }
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var b = document.querySelector('footer a[href*="beian.miit.gov.cn"]');
            if (b && config && config.beian) b.textContent = config.beian;
        });
    </script>
</body>
</html>

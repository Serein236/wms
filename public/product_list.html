<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品管理 - 仓库管理系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/common.css" rel="stylesheet">
    <link href="css/modern.css" rel="stylesheet">
    <link href="css/sidebar.css" rel="stylesheet">
    
</head>
<body>
    <div class="sidebar" id="sidebar"></div>

    <div class="main-wrapper">
        <div class="page-header d-flex justify-content-between align-items-center">
            <div>
                <h2><i class="bi bi-list-check me-2"></i>商品管理</h2>
                <p class="mb-0">查看、编辑、删除商品信息</p>
            </div>
            <div id="headerActions"></div>
        </div>

        <div class="page-header d-flex justify-content-between align-items-center">
            <div>
                <h2 class="mb-1"><i class="bi bi-list-check me-2"></i>商品管理</h2>
                <p class="mb-0">查看、编辑、删除商品信息</p>
            </div>
            <a href="products.html" class="btn btn-outline-light btn-sm"><i class="bi bi-plus-circle me-1"></i>新增商品</a>
        </div>
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-list-check me-2"></i>商品列表</span>
                <div class="d-flex gap-2">
                    <div class="input-group input-group-sm" style="width:250px"><span class="input-group-text"><i class="bi bi-search"></i></span><input type="text" class="form-control" id="searchInput" placeholder="搜索商品名称..."></div>
                </div>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle"><thead><tr><th>ID</th><th>商品编码</th><th>商品名称</th><th>规格</th><th>装箱规格</th><th>单位</th><th>零售价</th><th>生产厂家</th><th>库存</th><th>操作</th></tr></thead><tbody id="productsTable"></tbody></table>
                </div>
                <div id="emptyState" class="text-center text-muted py-4 d-none"><i class="bi bi-inbox fs-1"></i><p class="mt-2">暂无商品</p></div>
            </div>
            <div id="paginationControls" class="card-footer"></div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">编辑商品</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <input type="hidden" id="editProductId">
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label">商品编码</label><input type="text" class="form-control" id="editProductCode"></div>
                <div class="col-md-6"><label class="form-label">商品名称 <span class="text-danger">*</span></label><input type="text" class="form-control" id="editProductName"></div>
                <div class="col-md-6"><label class="form-label">规格</label><input type="text" class="form-control" id="editProductSpec"></div>
                <div class="col-md-6"><label class="form-label">装箱规格</label><input type="text" class="form-control" id="editPackingSpec"></div>
                <div class="col-md-4"><label class="form-label">单位</label><input type="text" class="form-control" id="editUnit"></div>
                <div class="col-md-4"><label class="form-label">零售价</label><input type="number" step="0.01" class="form-control" id="editRetailPrice"></div>
                <div class="col-md-4"><label class="form-label">条形码</label><input type="text" class="form-control" id="editBarcode"></div>
                <div class="col-md-6"><label class="form-label">生产厂家</label><input type="text" class="form-control" id="editManufacturer"></div>
                <div class="col-md-3"><label class="form-label">预警数量</label><input type="number" class="form-control" id="editWarningQuantity"></div>
                <div class="col-md-3"><label class="form-label">危险数量</label><input type="number" class="form-control" id="editDangerQuantity"></div>
            </div>
        </div>
        <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button class="btn btn-primary" onclick="updateProduct()">保存</button></div>
    </div></div></div>

    <!-- Detail Modal -->
    <div class="modal fade" id="detailModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">商品详情</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label text-muted">商品编码</label><p id="detailProductCode" class="fw-bold">-</p></div>
                <div class="col-md-6"><label class="form-label text-muted">商品名称</label><p id="detailProductName" class="fw-bold">-</p></div>
                <div class="col-md-6"><label class="form-label text-muted">规格</label><p id="detailProductSpec">-</p></div>
                <div class="col-md-6"><label class="form-label text-muted">装箱规格</label><p id="detailPackingSpec">-</p></div>
                <div class="col-md-4"><label class="form-label text-muted">单位</label><p id="detailUnit">-</p></div>
                <div class="col-md-4"><label class="form-label text-muted">零售价</label><p id="detailRetailPrice">-</p></div>
                <div class="col-md-4"><label class="form-label text-muted">条形码</label><p id="detailBarcode">-</p></div>
                <div class="col-md-6"><label class="form-label text-muted">生产厂家</label><p id="detailManufacturer">-</p></div>
                <div class="col-md-3"><label class="form-label text-muted">预警数量</label><p id="detailWarningQuantity">-</p></div>
                <div class="col-md-3"><label class="form-label text-muted">危险数量</label><p id="detailDangerQuantity">-</p></div>
            </div>
        </div>
        <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">关闭</button></div>
    </div>

    <footer><div class="container">&copy; 2026 仓库管理系统 | <a href="https://beian.miit.gov.cn/" target="_blank" class="text-decoration-none text-reset">鄂ICP备2025167566号</a></div></footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/pagination.js"></script>
    <script src="js/product_list.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            renderSidebar('product_list.html');
            document.addEventListener('DOMContentLoaded', function() {
            var b = document.querySelector('footer a[href*="beian.miit.gov.cn"]');
            if (b && config && config.beian) b.textContent = config.beian;
        });
        });
    </script>
</body>
</html>

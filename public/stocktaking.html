<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>库存盘点 - 仓库管理系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/common.css" rel="stylesheet">
    <link href="css/modern.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-warehouse me-2"></i>仓库管理系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house-door me-1"></i>首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="product_list.html"><i class="bi bi-box-seam me-1"></i>商品管理</a></li>
                    <li class="nav-item"><a class="nav-link" href="in.html"><i class="bi bi-arrow-down-circle me-1"></i>入库</a></li>
                    <li class="nav-item"><a class="nav-link" href="out.html"><i class="bi bi-arrow-up-circle me-1"></i>出库</a></li>
                    <li class="nav-item"><a class="nav-link" href="stock.html"><i class="bi bi-clipboard-data me-1"></i>库存</a></li>
                    <li class="nav-item"><a class="nav-link" href="suppliers.html"><i class="bi bi-truck me-1"></i>供应商</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-bar-chart me-1"></i>看板</a></li>
                    <li class="nav-item"><a class="nav-link" href="batch.html"><i class="bi bi-list-columns me-1"></i>批量</a></li>
                    <li class="nav-item"><a class="nav-link active" href="stocktaking.html"><i class="bi bi-clipboard-check me-1"></i>盘点</a></li>
                    <li class="nav-item"><a class="nav-link" href="settings.html"><i class="bi bi-gear me-1"></i>设置</a></li>
                </ul>
                <div class="d-flex align-items-center text-white">
                    <span id="currentUser" class="me-3"></span>
                    <button class="btn btn-outline-light btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>退出</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid main-content">
        <div class="page-header" style="background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); color: white; padding: 2rem; border-radius: 12px; margin-bottom: 1.5rem;">
            <h2 class="mb-1"><i class="bi bi-clipboard-check me-2"></i>库存盘点</h2>
            <p class="mb-0">创建盘点单，核对系统库存与实际库存</p>
        </div>

        <div id="listView">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0"><i class="bi bi-list-ul me-2"></i>盘点单列表</h5>
                <button class="btn btn-primary" onclick="showCreateModal()"><i class="bi bi-plus-circle me-1"></i>创建盘点单</button>
            </div>
            <div class="card"><div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle"><thead><tr><th>名称</th><th>状态</th><th>创建时间</th><th>完成时间</th><th>操作</th></tr></thead><tbody id="stocktakingList"></tbody></table>
                </div>
                <div id="emptyState" class="text-center text-muted py-4 d-none"><i class="bi bi-inbox fs-1"></i><p class="mt-2">暂无盘点单</p></div>
            </div></div>
        </div>

        <div id="detailView" class="d-none">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <button class="btn btn-outline-secondary btn-sm me-2" onclick="showList()"><i class="bi bi-arrow-left me-1"></i>返回</button>
                    <span class="fs-5 fw-bold" id="detailName"></span>
                    <span class="badge ms-2" id="detailStatus"></span>
                </div>
                <div class="btn-group">
                    <button class="btn btn-success btn-sm" id="btnStart" onclick="startStocktaking()" style="display:none"><i class="bi bi-play-circle me-1"></i>开始盘点</button>
                    <button class="btn btn-primary btn-sm" id="btnComplete" onclick="completeStocktaking()" style="display:none"><i class="bi bi-check-circle me-1"></i>完成盘点</button>
                    <button class="btn btn-danger btn-sm" id="btnCancel" onclick="cancelStocktaking()" style="display:none"><i class="bi bi-x-circle me-1"></i>取消</button>
                </div>
            </div>
            <div class="card"><div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover table-sm align-middle"><thead><tr><th>商品名称</th><th>规格</th><th>单位</th><th>系统库存</th><th>实际库存</th><th>差异</th><th>备注</th><th>操作</th></tr></thead><tbody id="detailItems"></tbody></table>
                </div>
            </div></div>
        </div>
    </div>

    <div class="modal fade" id="createModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">创建盘点单</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body"><div class="mb-3"><label class="form-label">盘点名称 <span class="text-danger">*</span></label><input type="text" class="form-control" id="stocktakingName" placeholder="如：2026年7月盘点"></div></div>
        <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button class="btn btn-primary" onclick="createStocktaking()">创建</button></div>
    </div></div></div>

    <div class="modal fade" id="editItemModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">盘点商品</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <p>商品: <strong id="editItemName"></strong></p>
            <p>系统库存: <strong id="editItemSystem"></strong></p>
            <div class="mb-3"><label class="form-label">实际库存 <span class="text-danger">*</span></label><input type="number" class="form-control" id="editItemActual" min="0"></div>
            <div class="mb-3"><label class="form-label">备注</label><input type="text" class="form-control" id="editItemRemark"></div>
        </div>
        <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button class="btn btn-primary" onclick="saveItem()">保存</button></div>
    </div></div></div>

    <footer><div class="container">&copy; 2026 仓库管理系统 | <a href="https://beian.miit.gov.cn/" target="_blank" class="text-decoration-none text-reset">鄂ICP备2025167566号</a></div></footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/stocktaking.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var b = document.querySelector('footer a[href*="beian.miit.gov.cn"]');
            if (b && config && config.beian) b.textContent = config.beian;
        });
    </script>
</body>
</html>

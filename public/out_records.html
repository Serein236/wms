<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出库记录 - 仓库管理系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/common.css" rel="stylesheet">
    <link href="css/modern.css" rel="stylesheet">
    <link href="css/sidebar.css" rel="stylesheet">
    
</head>
<body>
    <div class="sidebar" id="sidebar"></div>

    <div class="main-wrapper">
        <div class="page-header d-flex justify-content-between align-items-center">
            <div>
                <h2><i class="bi bi-list-ul me-2"></i>出库记录</h2>
                <p class="mb-0">查看所有出库记录详情</p>
            </div>
            <div id="headerActions"></div>
        </div>

        <div class="page-header d-flex justify-content-between align-items-center">
            <div>
                <h2 class="mb-1"><i class="bi bi-box-arrow-up me-2"></i>出库记录</h2>
                <p class="mb-0">查看所有出库记录详情</p>
            </div>
            <a href="out.html" class="btn btn-outline-light btn-sm"><i class="bi bi-plus-circle me-1"></i>办理出库</a>
        </div>
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-list-ul me-2"></i>出库记录</span>
                <div class="d-flex gap-2">
                    <select class="form-select form-select-sm" id="filterMonth" style="width:150px" onchange="loadOutRecords()"><option value="">全部月份</option></select>
                    <div class="input-group input-group-sm" style="width:200px"><span class="input-group-text"><i class="bi bi-search"></i></span><input type="text" class="form-control" id="outSearchInput" placeholder="搜索商品名称..."></div>
                    <button class="btn btn-success btn-sm" onclick="batchExportOutOrder()"><i class="bi bi-file-earmark-excel me-1"></i>批量导出</button>
                </div>
            </div>
            <div class="card-body">
                <div id="loading" class="text-center py-4"><div class="spinner-border text-primary"></div><p class="mt-2">加载中...</p></div>
                <div id="error" class="text-center text-danger py-4 d-none"></div>
                <div id="emptyState" class="text-center text-muted py-4 d-none"><i class="bi bi-inbox fs-1"></i><p class="mt-2">暂无出库记录</p></div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle"><thead><tr><th><input type="checkbox" id="selectAll"></th><th>ID</th><th>商品</th><th>出库方式</th><th>批号</th><th>数量</th><th>单价</th><th>总金额</th><th>客户名称</th><th>出库日期</th><th>备注</th><th>创建时间</th><th>操作</th></tr></thead><tbody id="outRecordsBody"></tbody></table>
                </div>
                <div id="recordCount" class="text-muted small mt-2"></div>
            </div>
            <div id="paginationControls" class="card-footer">
    </div>

    <footer><div class="container">&copy; 2026 仓库管理系统 | <a href="https://beian.miit.gov.cn/" target="_blank" class="text-decoration-none text-reset">鄂ICP备2025167566号</a></div></footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/records_common.js"></script>
    <script src="js/pagination.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    <script src="js/out_records.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            renderSidebar('out_records.html');
            document.addEventListener('DOMContentLoaded', function() {
            var b = document.querySelector('footer a[href*="beian.miit.gov.cn"]');
            if (b && config && config.beian) b.textContent = config.beian;
            initOutRecordsPage();
        });
        });
    </script>
</body>
</html>

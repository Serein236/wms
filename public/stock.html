<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>库存查看 - 仓库管理系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/common.css" rel="stylesheet">
    <link href="css/modern.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-warehouse me-2"></i>仓库管理系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house-door me-1"></i>首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="product_list.html"><i class="bi bi-box-seam me-1"></i>商品管理</a></li>
                    <li class="nav-item"><a class="nav-link" href="in.html"><i class="bi bi-arrow-down-circle me-1"></i>入库</a></li>
                    <li class="nav-item"><a class="nav-link" href="out.html"><i class="bi bi-arrow-up-circle me-1"></i>出库</a></li>
                    <li class="nav-item"><a class="nav-link active" href="stock.html"><i class="bi bi-clipboard-data me-1"></i>库存</a></li>
                    <li class="nav-item"><a class="nav-link" href="suppliers.html"><i class="bi bi-truck me-1"></i>供应商</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-bar-chart me-1"></i>看板</a></li>
                    <li class="nav-item"><a class="nav-link" href="batch.html"><i class="bi bi-list-columns me-1"></i>批量</a></li>
                    <li class="nav-item"><a class="nav-link" href="stocktaking.html"><i class="bi bi-clipboard-check me-1"></i>盘点</a></li>
                    <li class="nav-item"><a class="nav-link" href="settings.html"><i class="bi bi-gear me-1"></i>设置</a></li>
                </ul>
                <div class="d-flex align-items-center text-white">
                    <span id="currentUser" class="me-3"></span>
                    <button class="btn btn-outline-light btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>退出</button>
                </div>
            </div>
        </div>
    </nav>


    <div class="container-fluid main-content">
        <div class="page-header d-flex justify-content-between align-items-center">
            <div>
                <h2 class="mb-1"><i class="bi bi-clipboard-data me-2"></i>库存查看</h2>
                <p class="mb-0">查看所有商品的库存情况，实时掌握库存动态</p>
            </div>
            <a href="query.html" class="btn btn-outline-light btn-sm"><i class="bi bi-search me-1"></i>库存查询</a>
        </div>
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-clipboard-data me-2"></i>库存报表</span>
                <div class="d-flex gap-2">
                    <select class="form-select form-select-sm" id="statusFilter" style="width:130px" onchange="filterStock()"><option value="">全部状态</option><option value="normal">正常</option><option value="warning">预警</option><option value="danger">危险</option><option value="out_of_stock">缺货</option></select>
                    <div class="input-group input-group-sm" style="width:200px"><span class="input-group-text"><i class="bi bi-search"></i></span><input type="text" class="form-control" id="searchInput" placeholder="搜索商品名称..." oninput="filterStock()"></div>
                </div>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle"><thead><tr><th>ID</th><th>商品名称</th><th>规格</th><th>单位</th><th>批号</th><th>总入库</th><th>总出库</th><th>当前库存</th><th>入库价</th><th>库存价值</th></tr></thead><tbody id="stockTable"></tbody></table>
                </div>
                <div id="emptyState" class="text-center text-muted py-4 d-none"><i class="bi bi-inbox fs-1"></i><p class="mt-2">暂无库存数据</p></div>
            </div>
        </div>
    </div>

    <footer><div class="container">&copy; 2026 仓库管理系统 | <a href="https://beian.miit.gov.cn/" target="_blank" class="text-decoration-none text-reset">鄂ICP备2025167566号</a></div></footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/pagination.js"></script>

    <script src="js/stock.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var b = document.querySelector('footer a[href*="beian.miit.gov.cn"]');
            if (b && config && config.beian) b.textContent = config.beian;
        });
    </script>
</body>
</html>

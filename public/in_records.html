<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>入库记录 - 仓库管理系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/common.css" rel="stylesheet">
    <link href="css/modern.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-warehouse me-2"></i>仓库管理系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house-door me-1"></i>首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="product_list.html"><i class="bi bi-box-seam me-1"></i>商品管理</a></li>
                    <li class="nav-item"><a class="nav-link active" href="in.html"><i class="bi bi-arrow-down-circle me-1"></i>入库</a></li>
                    <li class="nav-item"><a class="nav-link" href="out.html"><i class="bi bi-arrow-up-circle me-1"></i>出库</a></li>
                    <li class="nav-item"><a class="nav-link" href="stock.html"><i class="bi bi-clipboard-data me-1"></i>库存</a></li>
                    <li class="nav-item"><a class="nav-link" href="suppliers.html"><i class="bi bi-truck me-1"></i>供应商</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-bar-chart me-1"></i>看板</a></li>
                    <li class="nav-item"><a class="nav-link" href="batch.html"><i class="bi bi-list-columns me-1"></i>批量</a></li>
                    <li class="nav-item"><a class="nav-link" href="stocktaking.html"><i class="bi bi-clipboard-check me-1"></i>盘点</a></li>
                    <li class="nav-item"><a class="nav-link" href="settings.html"><i class="bi bi-gear me-1"></i>设置</a></li>
                </ul>
                <div class="d-flex align-items-center text-white">
                    <span id="currentUser" class="me-3"></span>
                    <button class="btn btn-outline-light btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>退出</button>
                </div>
            </div>
        </div>
    </nav>


    <div class="container-fluid main-content">
        <div class="page-header d-flex justify-content-between align-items-center">
            <div>
                <h2 class="mb-1"><i class="bi bi-box-arrow-down me-2"></i>入库记录</h2>
                <p class="mb-0">查看所有入库记录详情</p>
            </div>
            <a href="in.html" class="btn btn-outline-light btn-sm"><i class="bi bi-plus-circle me-1"></i>办理入库</a>
        </div>
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-list-ul me-2"></i>入库记录</span>
                <div class="d-flex gap-2">
                    <select class="form-select form-select-sm" id="inMonthFilter" style="width:150px" onchange="loadInRecords()"><option value="">全部月份</option></select>
                    <div class="input-group input-group-sm" style="width:200px"><span class="input-group-text"><i class="bi bi-search"></i></span><input type="text" class="form-control" id="inSearchInput" placeholder="搜索商品名称..."></div>
                </div>
            </div>
            <div class="card-body">
                <div id="loading" class="text-center py-4"><div class="spinner-border text-primary"></div><p class="mt-2">加载中...</p></div>
                <div id="error" class="text-center text-danger py-4 d-none"></div>
                <div id="emptyState" class="text-center text-muted py-4 d-none"><i class="bi bi-inbox fs-1"></i><p class="mt-2">暂无入库记录</p></div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle"><thead><tr><th>ID</th><th>商品</th><th>入库方式</th><th>批号</th><th>生产日期</th><th>过期日期</th><th>数量</th><th>单价</th><th>总金额</th><th>供应商名称</th><th>入库日期</th><th>备注</th><th>创建时间</th><th>操作</th></tr></thead><tbody id="inRecordsBody"></tbody></table>
                </div>
                <div id="recordCount" class="text-muted small mt-2"></div>
            </div>
            <div id="paginationControls" class="card-footer"></div>
        </div>
    </div>
    <div class="modal fade" id="editInRecordModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">编辑入库记录</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <input type="hidden" id="edit_record_id">
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label">商品</label><input type="text" class="form-control" id="edit_product_name" readonly></div>
                <div class="col-md-6"><label class="form-label">入库方式</label><select class="form-select" id="edit_stock_method_name"><option>采购入库</option><option>退货入库</option><option>调拨入库</option><option>生产入库</option><option>其他入库</option></select></div>
                <div class="col-md-6"><label class="form-label">批号</label><input type="text" class="form-control" id="edit_batch_number"></div>
                <div class="col-md-3"><label class="form-label">生产日期</label><input type="date" class="form-control" id="edit_production_date"></div>
                <div class="col-md-3"><label class="form-label">过期日期</label><input type="date" class="form-control" id="edit_expiration_date"></div>
                <div class="col-md-4"><label class="form-label">数量</label><input type="number" class="form-control" id="edit_quantity" min="1"></div>
                <div class="col-md-4"><label class="form-label">单价</label><input type="number" class="form-control" id="edit_unit_price" step="0.01"></div>
                <div class="col-md-4"><label class="form-label">总金额</label><input type="number" class="form-control" id="edit_total_amount" step="0.01" readonly></div>
                <div class="col-md-6"><label class="form-label">供应商名称</label><input type="text" class="form-control" id="edit_source"></div>
                <div class="col-md-6"><label class="form-label">记录日期</label><input type="date" class="form-control" id="edit_recorded_date"></div>
                <div class="col-12"><label class="form-label">备注</label><textarea class="form-control" id="edit_remark" rows="2"></textarea></div>
            </div>
        </div>
        <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button class="btn btn-primary" id="saveEditBtn">保存</button></div>
    </div></div></div>

    <footer><div class="container">&copy; 2026 仓库管理系统 | <a href="https://beian.miit.gov.cn/" target="_blank" class="text-decoration-none text-reset">鄂ICP备2025167566号</a></div></footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>

    <script src="js/records_common.js"></script>
    <script src="js/pagination.js"></script>
    <script src="js/in_records.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var b = document.querySelector('footer a[href*="beian.miit.gov.cn"]');
            if (b && config && config.beian) b.textContent = config.beian;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户列表 - 仓库管理系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/common.css" rel="stylesheet">
    <link href="css/modern.css" rel="stylesheet">
    <link href="css/sidebar.css" rel="stylesheet">
</head>
<body>
    <div class="sidebar" id="sidebar"></div>
    <div class="main-wrapper">
        <div class="page-header d-flex justify-content-between align-items-center">
            <div><h2><i class="bi bi-people me-2"></i>客户管理</h2><p class="mb-0">查看、编辑、删除客户信息</p></div>
            <a href="customers.html" class="btn btn-outline-light btn-sm"><i class="bi bi-plus-circle me-1"></i>新增客户</a>
        </div>
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-list-check me-2"></i>客户列表</span>
                <div class="input-group input-group-sm" style="width:250px"><span class="input-group-text"><i class="bi bi-search"></i></span><input type="text" class="form-control" id="searchInput" placeholder="搜索客户名称..."></div>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead><tr><th>ID</th><th>客户名称</th><th>联系人</th><th>联系电话</th><th>邮箱</th><th>地址</th><th>操作</th></tr></thead>
                        <tbody id="customersTable"></tbody>
                    </table>
                </div>
                <div id="emptyState" class="text-center text-muted py-4 d-none"><i class="bi bi-inbox fs-1"></i><p class="mt-2">暂无客户</p></div>
            </div>
            <div id="paginationControls" class="card-footer"></div>
        </div>
    </div>

    <footer><div class="container">&copy; 2026 仓库管理系统 | <a href="https://beian.miit.gov.cn/" target="_blank" class="text-decoration-none text-reset">鄂ICP备2025167566号</a></div></footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/pagination.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/customer_list.js"></script>
</body>
</html>

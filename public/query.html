<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>库存查询 - 仓库管理系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/common.css" rel="stylesheet">
    <link href="css/modern.css" rel="stylesheet">
    <link href="css/sidebar.css" rel="stylesheet">
</head>
<body>
    <div class="sidebar" id="sidebar"></div>
    <div class="main-wrapper">
        <div class="page-header"><h2><i class="bi bi-search me-2"></i>库存查询</h2><p class="mb-0">按条件查询库存信息</p></div>
        <div class="card mb-4">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-3"><label class="form-label">商品名称</label><input type="text" class="form-control" id="queryName" placeholder="模糊搜索"></div>
                    <div class="col-md-2"><label class="form-label">库存状态</label><select class="form-select" id="queryStatus"><option value="">全部</option><option value="normal">正常</option><option value="warning">预警</option><option value="danger">危险</option><option value="out_of_stock">缺货</option></select></div>
                    <div class="col-md-2"><label class="form-label">最低库存</label><input type="number" class="form-control" id="queryMinStock" min="0"></div>
                    <div class="col-md-2"><label class="form-label">最高库存</label><input type="number" class="form-control" id="queryMaxStock" min="0"></div>
                    <div class="col-md-3 d-flex align-items-end"><button class="btn btn-primary" onclick="queryStock()"><i class="bi bi-search me-1"></i>查询</button> <button class="btn btn-outline-secondary ms-2" onclick="resetQuery()">重置</button></div>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle"><thead><tr><th>商品名称</th><th>规格</th><th>单位</th><th>当前库存</th><th>预警线</th><th>状态</th></tr></thead><tbody id="queryResult"></tbody></table>
                </div>
                <div id="emptyState" class="text-center text-muted py-4"><p>请输入查询条件</p></div>
            </div>
        </div>
    </div>
    <footer><div class="container">&copy; 2026 仓库管理系统 | <a href="https://beian.miit.gov.cn/" target="_blank" class="text-decoration-none text-reset">鄂ICP备2025167566号</a></div></footer>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        var allStock = [];
        async function queryStock() {
            try {
                var resp = await fetch('/api/stock?pageSize=500');
                var data = await resp.json();
                allStock = data.data || data;
                var name = (document.getElementById('queryName').value || '').toLowerCase();
                var status = document.getElementById('queryStatus').value;
                var min = parseInt(document.getElementById('queryMinStock').value) || 0;
                var max = parseInt(document.getElementById('queryMaxStock').value) || Infinity;
                var filtered = allStock.filter(function(s) {
                    if (name && !(s.name || s.product_name || '').toLowerCase().includes(name)) return false;
                    if (status && (s.stock_status || s.batch_status) !== status) return false;
                    if ((s.current_stock || 0) < min) return false;
                    if ((s.current_stock || 0) > max) return false;
                    return true;
                });
                renderQuery(filtered);
            } catch(e) { console.error(e); }
        }
        function renderQuery(items) {
            var tbody = document.getElementById('queryResult');
            var empty = document.getElementById('emptyState');
            if (!items.length) { tbody.innerHTML = ''; empty.classList.remove('d-none'); empty.querySelector('p').textContent = '无匹配结果'; return; }
            empty.classList.add('d-none');
            var statusMap = { normal: ['bg-success','正常'], warning: ['bg-warning text-dark','预警'], danger: ['bg-danger','危险'], out_of_stock: ['bg-dark','缺货'] };
            tbody.innerHTML = items.map(function(s) {
                var st = statusMap[s.stock_status || s.batch_status] || ['bg-secondary', s.stock_status || s.batch_status];
                return '<tr><td>' + (s.name||s.product_name||'') + '</td><td>' + (s.spec||s.product_spec||'-') + '</td><td>' + (s.unit||s.product_unit||'-') + '</td><td>' + (s.current_stock||0) + '</td><td>' + (s.warning_quantity||'-') + '</td><td><span class="badge ' + st[0] + '">' + st[1] + '</span></td></tr>';
            }).join('');
        }
        function resetQuery() { document.getElementById('queryName').value = ''; document.getElementById('queryStatus').value = ''; document.getElementById('queryMinStock').value = ''; document.getElementById('queryMaxStock').value = ''; document.getElementById('queryResult').innerHTML = ''; document.getElementById('emptyState').classList.remove('d-none'); document.getElementById('emptyState').querySelector('p').textContent = '请输入查询条件'; }
        async function checkLogin() { try { var r = await fetch('/api/auth/current-user'); var d = await r.json(); if (!d.loggedIn) { window.location.href = 'login.html'; return; } document.getElementById('currentUser').textContent = '欢迎, ' + d.username; } catch(e) { window.location.href = 'login.html'; } }
        document.addEventListener('DOMContentLoaded', function() { renderSidebar('query.html'); checkLogin(); });
    </script>
</body>
</html>

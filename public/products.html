    <link href="css/common.css" rel="stylesheet">
    <!-- Modern 现代化样式 -->
    <link href="css/modern.css" rel="stylesheet">
</head>

    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-warehouse me-2"></i>仓库管理系统
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            <i class="bi bi-house-door me-1"></i>首页
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="products.html">
                            <i class="bi bi-plus-circle me-1"></i>添加商品
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="product_list.html">
                            <i class="bi bi-list-check me-1"></i>商品列表
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="in.html">
                            <i class="bi bi-arrow-down-circle me-1"></i>入库管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="in_records.html">
                            <i class="bi bi-box-arrow-down me-1"></i>入库记录
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="out.html">
                            <i class="bi bi-arrow-up-circle me-1"></i>出库管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="out_records.html">
                            <i class="bi bi-box-arrow-up me-1"></i>出库记录
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="stock.html">
                            <i class="bi bi-clipboard-data me-1"></i>库存查看
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="query.html">
                            <i class="bi bi-search me-1"></i>库存查询
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="settings.html">
                            <i class="bi bi-gear me-1"></i>系统设置
                        </a>
                    </li>
                </ul>

                <div class="d-flex align-items-center text-white">
                    <span id="currentUser" class="me-3"></span>
                    <button class="btn btn-outline-light btn-sm" onclick="logout()">
                        <i class="bi bi-box-arrow-right me-1"></i>退出登录
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <div class="container-fluid main-content">
        <div class="page-header">
            <h2 class="mb-1"><i class="bi bi-plus-circle me-2"></i>添加商品</h2>
            <p class="mb-0">添加新商品信息，设置商品规格和库存预警</p>
        </div>

        <!-- 添加商品表单卡片 -->
        <div class="card">
            <div class="card-header d-flex align-items-center">
                <i class="bi bi-plus-circle me-2"></i>添加新商品
            </div>
            <div class="card-body">
                <form id="addProductForm">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label for="productName" class="form-label">商品名称 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="productName" required placeholder="请输入商品名称">
                        </div>
                        <div class="col-md-2">
                            <label for="productSpec" class="form-label">产品规格</label>
                            <input type="text" class="form-control" id="productSpec" placeholder="请输入产品规格">
                        </div>
                        <div class="col-md-2">
                            <label for="packingSpec" class="form-label">装箱规格</label>
                            <input type="text" class="form-control" id="packingSpec" placeholder="请输入装箱规格">
                        </div>
                        <div class="col-md-1">
                            <label for="unit" class="form-label">单位</label>
                            <input type="text" class="form-control" id="unit" placeholder="个/箱">
                        </div>
                        <div class="col-md-1">
                            <label for="retailPrice" class="form-label">零售价</label>
                            <input type="number" step="0.01" class="form-control" id="retailPrice" placeholder="零售价">
                        </div>
                        <div class="col-md-3">
                            <label for="barcode" class="form-label">条形码</label>
                            <input type="text" class="form-control" id="barcode" placeholder="请输入条形码">
                        </div>
                        <div class="col-md-3">
                            <label for="manufacturer" class="form-label">生产厂家</label>
                            <input type="text" class="form-control" id="manufacturer" placeholder="请输入生产厂家">
                        </div>
                        <div class="col-md-2">
                            <label for="warningQuantity" class="form-label">警告库存</label>
                            <input type="number" class="form-control" id="warningQuantity" value="10" placeholder="警告库存数量">
                        </div>
                        <div class="col-md-2">
                            <label for="dangerQuantity" class="form-label">危险库存</label>
                            <input type="number" class="form-control" id="dangerQuantity" value="5" placeholder="危险库存数量">
                        </div>
                        <div class="col-md-6 align-self-end">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-plus-circle me-2"></i>添加商品
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            &copy; 2026 仓库管理系统 | <a href="https://beian.miit.gov.cn/" target="_blank"
                class="text-decoration-none text-reset">鄂ICP备2025167566号</a>
        </div>
    </footer>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const beianLink = document.querySelector('footer a[href*="beian.miit.gov.cn"]');
            if (beianLink && config.beian) {
                beianLink.textContent = config.beian;
            }
        });
    </script>

    <script src="js/products.js"></script>
</body>

</html>

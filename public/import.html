<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据导入 - 仓库管理系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/common.css" rel="stylesheet">
    <link href="css/modern.css" rel="stylesheet">
    <link href="css/sidebar.css" rel="stylesheet">
    
</head>
<body>
    <div class="sidebar" id="sidebar"></div>

    <div class="main-wrapper">
        <div class="page-header d-flex justify-content-between align-items-center">
            <div>
                <h2><i class="bi bi-upload me-2"></i>数据导入</h2>
                <p class="mb-0">支持Excel和CSV文件批量导入商品数据</p>
            </div>
            <div id="headerActions"></div>
        </div>

        <div class="page-header" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; padding: 2rem; border-radius: 12px; margin-bottom: 1.5rem;">
            <h2 class="mb-1"><i class="bi bi-upload me-2"></i>数据导入</h2>
            <p class="mb-0">支持 Excel 和 CSV 文件批量导入商品数据</p>
        </div>
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-header"><i class="bi bi-cloud-arrow-up me-2"></i>上传文件</div>
                    <div class="card-body">
                        <div class="upload-zone" id="uploadZone" style="border:3px dashed #dee2e6;border-radius:12px;padding:3rem;text-align:center;cursor:pointer;">
                            <i class="bi bi-cloud-arrow-up d-block mb-3" style="font-size:3rem;color:#6c757d;"></i>
                            <h5>拖拽文件到此处或点击选择</h5>
                            <p class="text-muted mb-3">支持 .xlsx, .xls, .csv 格式，最大 10MB</p>
                            <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" class="d-none">
                            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()"><i class="bi bi-folder2-open me-1"></i>选择文件</button>
                        </div>
                        <div id="selectedFile" class="mt-3 d-none">
                            <div class="alert alert-info d-flex justify-content-between align-items-center"><span><i class="bi bi-file-earmark-excel me-2"></i><span id="fileName"></span></span><button class="btn btn-sm btn-outline-danger" onclick="clearFile()"><i class="bi bi-x"></i></button></div>
                            <button class="btn btn-success w-100" id="importBtn" onclick="startImport()"><i class="bi bi-cloud-arrow-up me-1"></i>开始导入</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card mb-3">
                    <div class="card-header"><i class="bi bi-info-circle me-2"></i>导入说明</div>
                    <div class="card-body">
                        <h6>必填字段</h6><ul class="list-unstyled"><li><code>name</code> - 商品名称</li></ul>
                        <h6>可选字段</h6><ul class="list-unstyled"><li><code>spec</code> - 规格</li><li><code>unit</code> - 单位</li><li><code>retail_price</code> - 零售价</li></ul>
                    </div>
                </div>
                <a href="/api/import/template" class="btn btn-outline-primary w-100"><i class="bi bi-download me-1"></i>下载导入模板</a>
    </div>

        </div>
    </div>
<footer><div class="container">&copy; 2026 仓库管理系统 | <a href="https://beian.miit.gov.cn/" target="_blank" class="text-decoration-none text-reset">鄂ICP备2025167566号</a></div></footer>

    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/import.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            renderSidebar('import.html');
            document.addEventListener('DOMContentLoaded', function() {
            var b = document.querySelector('footer a[href*="beian.miit.gov.cn"]');
            if (b && config && config.beian) b.textContent = config.beian;
        });
        });
    </script>
</body>
</html>

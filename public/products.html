<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加商品 - 仓库管理系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/common.css" rel="stylesheet">
    <link href="css/modern.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-warehouse me-2"></i>仓库管理系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house-door me-1"></i>首页</a></li>
                    <li class="nav-item"><a class="nav-link active" href="product_list.html"><i class="bi bi-box-seam me-1"></i>商品管理</a></li>
                    <li class="nav-item"><a class="nav-link" href="in.html"><i class="bi bi-arrow-down-circle me-1"></i>入库</a></li>
                    <li class="nav-item"><a class="nav-link" href="out.html"><i class="bi bi-arrow-up-circle me-1"></i>出库</a></li>
                    <li class="nav-item"><a class="nav-link" href="stock.html"><i class="bi bi-clipboard-data me-1"></i>库存</a></li>
                    <li class="nav-item"><a class="nav-link" href="suppliers.html"><i class="bi bi-truck me-1"></i>供应商</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-bar-chart me-1"></i>看板</a></li>
                    <li class="nav-item"><a class="nav-link" href="batch.html"><i class="bi bi-list-columns me-1"></i>批量</a></li>
                    <li class="nav-item"><a class="nav-link" href="stocktaking.html"><i class="bi bi-clipboard-check me-1"></i>盘点</a></li>
                    <li class="nav-item"><a class="nav-link" href="settings.html"><i class="bi bi-gear me-1"></i>设置</a></li>
                </ul>
                <div class="d-flex align-items-center text-white">
                    <span id="currentUser" class="me-3"></span>
                    <button class="btn btn-outline-light btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>退出</button>
                </div>
            </div>
        </div>
    </nav>


    <div class="container-fluid main-content">
        <div class="page-header d-flex justify-content-between align-items-center">
            <div>
                <h2 class="mb-1"><i class="bi bi-plus-circle me-2"></i>添加商品</h2>
                <p class="mb-0">添加新商品信息</p>
            </div>
            <a href="product_list.html" class="btn btn-outline-light btn-sm"><i class="bi bi-list-check me-1"></i>返回列表</a>
        </div>
        <div class="card">
            <div class="card-header"><i class="bi bi-plus-circle me-2"></i>添加新商品</div>
            <div class="card-body">
                <form id="addProductForm">
                    <div class="row g-3">
                        <div class="col-md-3"><label class="form-label">商品名称 <span class="text-danger">*</span></label><input type="text" class="form-control" id="productName" required placeholder="商品名称"></div>
                        <div class="col-md-2"><label class="form-label">规格</label><input type="text" class="form-control" id="productSpec" placeholder="规格"></div>
                        <div class="col-md-2"><label class="form-label">装箱规格</label><input type="text" class="form-control" id="packingSpec" placeholder="装箱规格"></div>
                        <div class="col-md-1"><label class="form-label">单位</label><input type="text" class="form-control" id="unit" placeholder="个/箱"></div>
                        <div class="col-md-1"><label class="form-label">零售价</label><input type="number" step="0.01" class="form-control" id="retailPrice" placeholder="0.00"></div>
                        <div class="col-md-3"><label class="form-label">条形码</label><input type="text" class="form-control" id="barcode" placeholder="条形码"></div>
                        <div class="col-md-3"><label class="form-label">生产厂家</label><input type="text" class="form-control" id="manufacturer" placeholder="厂家"></div>
                        <div class="col-md-2"><label class="form-label">预警数量</label><input type="number" class="form-control" id="warningQuantity" value="10"></div>
                        <div class="col-md-2"><label class="form-label">危险数量</label><input type="number" class="form-control" id="dangerQuantity" value="5"></div>
                        <div class="col-12"><button type="submit" class="btn btn-primary"><i class="bi bi-check-circle me-2"></i>添加商品</button></div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer><div class="container">&copy; 2026 仓库管理系统 | <a href="https://beian.miit.gov.cn/" target="_blank" class="text-decoration-none text-reset">鄂ICP备2025167566号</a></div></footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>

    <script>
        document.getElementById('addProductForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            try {
                var resp = await fetch('/api/products', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: document.getElementById('productName').value, spec: document.getElementById('productSpec').value, unit: document.getElementById('unit').value, packing_spec: document.getElementById('packingSpec').value, retail_price: parseFloat(document.getElementById('retailPrice').value) || null, barcode: document.getElementById('barcode').value || null, manufacturer: document.getElementById('manufacturer').value || null, warning_quantity: parseInt(document.getElementById('warningQuantity').value) || 10, danger_quantity: parseInt(document.getElementById('dangerQuantity').value) || 5 }) });
                var result = await resp.json();
                if (result.success) { alert('添加成功'); window.location.href = 'product_list.html'; } else { alert(result.message || '添加失败'); }
            } catch(e) { alert('添加失败: ' + e.message); }
        });
        async function checkLogin() { try { var r = await fetch('/api/auth/current-user'); var d = await r.json(); if (!d.loggedIn) { window.location.href = 'login.html'; return; } document.getElementById('currentUser').textContent = '欢迎, ' + d.username; } catch(e) { window.location.href = 'login.html'; } }
        async function logout() { await fetch('/api/auth/logout', {method:'POST'}); window.location.href = 'login.html'; }
        document.addEventListener('DOMContentLoaded', checkLogin);
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var b = document.querySelector('footer a[href*="beian.miit.gov.cn"]');
            if (b && config && config.beian) b.textContent = config.beian;
        });
    </script>
</body>
</html>

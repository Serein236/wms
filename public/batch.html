<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>批量出入库 - 仓库管理系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/common.css" rel="stylesheet">
    <link href="css/modern.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-warehouse me-2"></i>仓库管理系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house-door me-1"></i>首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="product_list.html"><i class="bi bi-box-seam me-1"></i>商品管理</a></li>
                    <li class="nav-item"><a class="nav-link" href="in.html"><i class="bi bi-arrow-down-circle me-1"></i>入库</a></li>
                    <li class="nav-item"><a class="nav-link" href="out.html"><i class="bi bi-arrow-up-circle me-1"></i>出库</a></li>
                    <li class="nav-item"><a class="nav-link" href="stock.html"><i class="bi bi-clipboard-data me-1"></i>库存</a></li>
                    <li class="nav-item"><a class="nav-link" href="suppliers.html"><i class="bi bi-truck me-1"></i>供应商</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-bar-chart me-1"></i>看板</a></li>
                    <li class="nav-item"><a class="nav-link active" href="batch.html"><i class="bi bi-list-columns me-1"></i>批量</a></li>
                    <li class="nav-item"><a class="nav-link" href="stocktaking.html"><i class="bi bi-clipboard-check me-1"></i>盘点</a></li>
                    <li class="nav-item"><a class="nav-link" href="settings.html"><i class="bi bi-gear me-1"></i>设置</a></li>
                </ul>
                <div class="d-flex align-items-center text-white">
                    <span id="currentUser" class="me-3"></span>
                    <button class="btn btn-outline-light btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>退出</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid main-content">
        <div class="page-header" style="background: linear-gradient(135deg, #fc4a1a 0%, #f7b733 100%); color: white; padding: 2rem; border-radius: 12px; margin-bottom: 1.5rem;">
            <h2 class="mb-1"><i class="bi bi-list-columns me-2"></i>批量出入库</h2>
            <p class="mb-0">一次性处理多个商品的入库或出库操作</p>
        </div>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-list-check me-2"></i>操作列表</span>
                        <div class="btn-group btn-group-sm">
                            <button class="btn btn-success active" id="btnInMode" onclick="setMode('in')"><i class="bi bi-arrow-down-circle me-1"></i>批量入库</button>
                            <button class="btn btn-warning" id="btnOutMode" onclick="setMode('out')"><i class="bi bi-arrow-up-circle me-1"></i>批量出库</button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="batchItems"></div>
                        <button class="btn btn-outline-primary mt-3" onclick="addItem()"><i class="bi bi-plus-circle me-1"></i>添加一行</button>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card mb-3">
                    <div class="card-header"><i class="bi bi-gear me-2"></i>公共设置</div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label" id="commonFieldLabel">来源</label>
                            <input type="text" class="form-control" id="commonSource" placeholder="供应商/客户名称">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">记录日期</label>
                            <input type="date" class="form-control" id="commonDate">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">备注</label>
                            <textarea class="form-control" id="commonRemark" rows="2" placeholder="可选备注"></textarea>
                        </div>
                    </div>
                </div>
                <div class="card mb-3">
                    <div class="card-body text-center">
                        <div class="fs-1 fw-bold text-primary" id="totalCount">0</div>
                        <div class="text-muted">待处理项目</div>
                    </div>
                </div>
                <button class="btn btn-primary btn-lg w-100" onclick="submitBatch()" id="submitBtn">
                    <i class="bi bi-check-circle me-1"></i>提交批量操作
                </button>
            </div>
        </div>
    </div>

    <footer><div class="container">&copy; 2026 仓库管理系统 | <a href="https://beian.miit.gov.cn/" target="_blank" class="text-decoration-none text-reset">鄂ICP备2025167566号</a></div></footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/batch.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var b = document.querySelector('footer a[href*="beian.miit.gov.cn"]');
            if (b && config && config.beian) b.textContent = config.beian;
        });
    </script>
</body>
</html>

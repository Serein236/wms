<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户管理 - 仓库管理系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/common.css" rel="stylesheet">
    <link href="css/modern.css" rel="stylesheet">
    <link href="css/sidebar.css" rel="stylesheet">
</head>
<body>
    <div class="sidebar" id="sidebar"></div>
    <div class="main-wrapper">
        <div class="page-header">
            <h2><i class="bi bi-people me-2"></i>客户管理</h2>
            <p class="mb-0">管理客户信息，包括联系人、电话、地址等</p>
        </div>
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <div><i class="bi bi-people me-2"></i>客户列表 <span class="badge bg-primary ms-2" id="customerCountBadge">0</span></div>
                <div class="d-flex gap-2">
                    <div class="input-group input-group-sm" style="width:250px"><span class="input-group-text"><i class="bi bi-search"></i></span><input type="text" class="form-control" id="searchInput" placeholder="搜索客户名称..." oninput="debounceSearch()"></div>
                    <button class="btn btn-primary btn-sm" onclick="showAddModal()"><i class="bi bi-plus-circle me-1"></i>新增客户</button>
                </div>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead><tr><th>序号</th><th>客户名称</th><th>联系人</th><th>联系电话</th><th>邮箱</th><th>地址</th><th>状态</th><th>操作</th></tr></thead>
                        <tbody id="customerTable"></tbody>
                    </table>
                </div>
                <div id="emptyState" class="text-center text-muted py-5 d-none"><i class="bi bi-inbox fs-1"></i><p class="mt-2">暂无客户数据</p></div>
            </div>
            <div id="paginationControls" class="card-footer"></div>
        </div>
    </div>

    <div class="modal fade" id="customerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title" id="customerModalTitle">新增客户</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <input type="hidden" id="customerId">
                    <div class="mb-3"><label class="form-label">客户名称 <span class="text-danger">*</span></label><input type="text" class="form-control" id="customerName"></div>
                    <div class="row">
                        <div class="col-md-6"><div class="mb-3"><label class="form-label">联系人</label><input type="text" class="form-control" id="customerContact"></div></div>
                        <div class="col-md-6"><div class="mb-3"><label class="form-label">联系电话</label><input type="text" class="form-control" id="customerPhone"></div></div>
                    </div>
                    <div class="mb-3"><label class="form-label">邮箱</label><input type="email" class="form-control" id="customerEmail"></div>
                    <div class="mb-3"><label class="form-label">地址</label><input type="text" class="form-control" id="customerAddress"></div>
                    <div class="mb-3"><label class="form-label">备注</label><textarea class="form-control" id="customerRemark" rows="3"></textarea></div>
                </div>
                <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button class="btn btn-primary" onclick="saveCustomer()">保存</button></div>
            </div>
        </div>
    </div>

    <footer><div class="container">&copy; 2026 仓库管理系统 | <a href="https://beian.miit.gov.cn/" target="_blank" class="text-decoration-none text-reset">鄂ICP备2025167566号</a></div></footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/pagination.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/customers.js"></script>
</body>
</html>
